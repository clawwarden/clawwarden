[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vaultex"
version = "0.1.0"
description = "Vaultex open SDK: data-sensitivity classifier (reference pipeline) + Governance Service client"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
keywords = ["pii", "data-classification", "llm", "governance", "compliance"]
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.urls]
Homepage = "https://vaultex.space"
Repository = "https://github.com/sammy995/vaultex"

[tool.setuptools.packages.find]
include = ["vaultex*"]
